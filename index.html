
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Event Tracker</title>
    <style>:root {
    --bg-color: #0f172a;
    --card-bg: rgba(30, 41, 59, 0.7);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --accent-blue: #38bdf8;
    --accent-purple: #818cf8;
    --accent-red: #fb7185;
    --glass-border: rgba(255, 255, 255, 0.1);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
}

body {
    background-color: var(--bg-color);
    background-image: 
        radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0, transparent 50%),
        radial-gradient(at 100% 100%, rgba(129, 140, 248, 0.15) 0, transparent 50%);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 2rem 1rem;
    line-height: 1.6;
}

.container {
    max-width: 1000px;
    margin: 0 auto;
}

header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeInDown 0.8s ease-out;
}

h1 {
    font-size: 2.5rem;
    font-weight: 800;
    background: linear-gradient(to right, var(--accent-blue), var(--accent-purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
}

.date-badge {
    display: inline-block;
    padding: 0.25rem 1rem;
    background: var(--card-bg);
    border: 1px solid var(--glass-border);
    border-radius: 999px;
    font-size: 0.875rem;
    color: var(--accent-blue);
    backdrop-filter: blur(8px);
}

.game-section {
    margin-bottom: 4rem;
}

.game-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    padding-left: 1rem;
    border-left: 4px solid var(--accent-blue);
}

.event-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.5rem;
}

.event-card {
    background: var(--card-bg);
    border: 1px solid var(--glass-border);
    border-radius: 1rem;
    padding: 1.5rem;
    backdrop-filter: blur(12px);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    display: flex;
    flex-direction: column;
}

.event-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
    border-color: rgba(255, 255, 255, 0.2);
}

.event-card.expired {
    opacity: 0.6;
    filter: grayscale(0.5);
}

.event-card.expired .event-title {
    text-decoration: line-through;
}

.urgent-tag {
    background: var(--accent-red);
    color: white;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.125rem 0.5rem;
    border-radius: 4px;
    display: inline-block;
    margin-bottom: 0.75rem;
    animation: pulse 2s infinite;
}

.event-title {
    font-size: 1.125rem;
    font-weight: 700;
    margin-bottom: 0.75rem;
    color: var(--text-primary);
}

.event-period {
    font-size: 0.875rem;
    color: var(--text-secondary);
    margin-bottom: 1.5rem;
    flex-grow: 1;
}

.event-actions {
    display: flex;
    gap: 0.75rem;
}

.btn {
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0.5rem;
    border-radius: 0.5rem;
    font-size: 0.8125rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
}

.btn-lounge {
    background: rgba(255, 255, 255, 0.05);
    color: var(--text-primary);
    border: 1px solid var(--glass-border);
}

.btn-lounge:hover {
    background: rgba(255, 255, 255, 0.1);
}

.btn-web {
    background: var(--accent-blue);
    color: #0f172a;
}

.btn-web:hover {
    opacity: 0.9;
}

@keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.05); opacity: 0.8; }
    100% { transform: scale(1); opacity: 1; }
}

@media (max-width: 640px) {
    h1 { font-size: 2rem; }
    .event-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
    <div class="container">
        <header>
            <h1>GAME EVENT TRACKER</h1>
            <div class="date-badge">Last Update: 2026-03-28 23:13</div>
        </header>

        <div id="dashboard">
            
        <div class="empty-state">
            <p>현재 표시할 이벤트가 없습니다.</p>
            <p><small>GitHub Secrets에 <b>GOOGLE_API_KEY</b>가 올바르게 등록되어 있는지 확인해 주세요.</small></p>
        </div>
        
        </div>
    </div>
</body>
</html>
